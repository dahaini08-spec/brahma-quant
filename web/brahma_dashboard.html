<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>姓赵不宣 · 实盘策略</title>
<script src="/static/chart.min.js"></script>
<style>
:root{
  --bg:#0d0f17;--surface:#131625;--surface2:#1a1d2e;--border:#252840;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --bull:#22c55e;--bear:#ef4444;--accent:#7c3aed;
  --warn:#f59e0b;--blue:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-size:13px;min-height:100vh}

/* ── 顶部导航 ── */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:20px}
.logo-name{font-size:16px;font-weight:800;letter-spacing:-0.5px}
.logo-sub{font-size:11px;color:var(--text2);font-weight:400}
.topbar-right{display:flex;align-items:center;gap:12px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--bull);font-weight:600}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--bull);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.update-ts{font-size:10px;color:var(--text3)}

/* ── 汇总栏 ── */
.nav-bar{display:grid;grid-template-columns:repeat(5,1fr);background:var(--surface);border-bottom:1px solid var(--border)}
.nav-item{padding:14px 20px;border-right:1px solid var(--border)}
.nav-item:last-child{border-right:none}
.nav-item .label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.nav-item .value{font-size:22px;font-weight:800;line-height:1.1}
.nav-item .sub{font-size:10px;color:var(--text2);margin-top:3px}
.bull{color:var(--bull)}.bear{color:var(--bear)}.warn{color:var(--warn)}.blue{color:var(--blue)}

/* ── Tab ── */
.tabs{display:flex;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);gap:0}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none}.tab-panel.active{display:block}

/* ── 内容区 ── */
.content{padding:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ── 持仓卡 ── */
.pos-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.pos-card.profit{border-left:3px solid var(--bull)}
.pos-card.loss{border-left:3px solid var(--bear)}
.pos-card+.pos-card{margin-top:10px}
.pos-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pos-sym{font-size:16px;font-weight:800;letter-spacing:-.3px}
.pos-pnl{font-size:18px;font-weight:800}
.sim-pnl{font-size:14px;font-weight:700;opacity:.85}
.pos-body{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pos-body>div>div:first-child{font-size:10px;color:var(--text2);margin-bottom:2px}
.pos-body>div>div:last-child{font-size:12px;font-weight:600}
.dir-pill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.dir-pill.LONG{background:#22c55e20;color:var(--bull)}
.dir-pill.SHORT{background:#ef444420;color:var(--bear)}
.lev-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;color:var(--text2);background:var(--border);margin-left:4px}

/* ── 统计块 ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;text-align:center}
.s-lab{font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.s-val{font-size:18px;font-weight:800}

/* ── 历史记录 ── */
.hist-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.hs-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;text-align:center}
.hs-l{font-size:10px;color:var(--text2);margin-bottom:4px}
.hs-v{font-size:18px;font-weight:800}
.hist-table{width:100%;border-collapse:collapse;font-size:12px}
.hist-table th{padding:8px 10px;text-align:left;color:var(--text2);font-weight:600;font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.hist-table td{padding:9px 10px;border-bottom:1px solid var(--border)15}
.hist-table tr:hover td{background:var(--surface2)}
.sp-W{background:#22c55e20;color:var(--bull);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.sp-L{background:#ef444420;color:var(--bear);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.sp-T{background:#f59e0b20;color:var(--warn);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.sp-O{background:var(--border);color:var(--text2);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}

/* ── 图表 ── */
.card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.chart-wrap{height:180px;position:relative}

/* ── 空状态 ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.e-icon{font-size:32px;margin-bottom:8px}
.e-text{font-size:12px}

/* ── 响应式 ── */
@media(max-width:768px){
  .nav-bar{grid-template-columns:repeat(3,1fr)}
  .grid-2{grid-template-columns:1fr}
  .stat-row,.hist-summary{grid-template-columns:repeat(2,1fr)}
  .tabs{overflow-x:auto}
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🦅</div>
    <span class="logo-name">姓赵不宣</span>
    <span class="logo-sub">实盘策略</span>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><div class="live-dot"></div>实时</div>
    <span class="update-ts" id="last-update">--</span>
  </div>
</div>

<!-- 汇总栏 -->
<div class="nav-bar">
  <div class="nav-item">
    <div class="label">本金</div>
    <div class="value">$100,000</div>
    <div class="sub">策略本金</div>
  </div>
  <div class="nav-item">
    <div class="label">当前浮盈</div>
    <div class="value bull" id="nav-float">--</div>
    <div class="sub" id="nav-float-sub">姓赵不宣口径</div>
  </div>
  <div class="nav-item">
    <div class="label">持仓数</div>
    <div class="value" id="pos-count">--</div>
    <div class="sub">活跃仓位</div>
  </div>
  <div class="nav-item">
    <div class="label">历史胜率</div>
    <div class="value bull" id="hdr-wr">82.5%</div>
    <div class="sub" id="hdr-wr-sub">63单实结算</div>
  </div>
  <div class="nav-item">
    <div class="label">WIN / LOSS</div>
    <div class="value" id="hdr-wl">52 / 11</div>
    <div class="sub">历史战绩</div>
  </div>
</div>

<!-- Tab 导航 -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('positions')">💼 当前持仓</div>
  <div class="tab" onclick="switchTab('history')">📋 历史战绩</div>
</div>

<!-- ══════════ Tab 1: 当前持仓 ══════════ -->
<div class="tab-panel active" id="tab-positions">
<div class="content">
  <!-- 统计四格 -->
  <div class="stat-row" id="pos-stat-row">
    <div class="stat-box"><div class="s-lab">总PnL</div><div class="s-val" id="total-pnl-val">--</div></div>
    <div class="stat-box"><div class="s-lab">多头PnL</div><div class="s-val bull" id="long-pnl-val">--</div></div>
    <div class="stat-box"><div class="s-lab">空头PnL</div><div class="s-val bear" id="short-pnl-val">--</div></div>
    <div class="stat-box"><div class="s-lab">最大单仓</div><div class="s-val" id="best-pos-val">--</div></div>
  </div>
  <div class="grid-2">
    <!-- 左：持仓列表 -->
    <div id="pos-list">
      <div class="empty-state"><div class="e-icon">💤</div><div class="e-text">暂无持仓</div></div>
    </div>
    <!-- 右：NAV曲线 -->
    <div>
      <div class="card">
        <div class="card-title">📈 净值曲线 NAV</div>
        <div class="chart-wrap">
          <canvas id="nav-chart"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ══════════ Tab 2: 历史战绩 ══════════ -->
<div class="tab-panel" id="tab-history">
<div class="content">
  <div class="hist-summary" id="hs-row">
    <div class="hs-card"><div class="hs-l">已结算笔数</div><div class="hs-v" id="h-total">--</div></div>
    <div class="hs-card"><div class="hs-l">历史胜率</div><div class="hs-v bull" id="h-wr">--</div></div>
    <div class="hs-card"><div class="hs-l">历史总盈亏</div><div class="hs-v" id="h-pnl">--</div></div>
    <div class="hs-card"><div class="hs-l">WIN / LOSS</div><div class="hs-v blue" id="h-wl">--</div></div>
  </div>
  <div class="card">
    <div class="card-title">📊 历史成交记录（按姓赵不宣口径换算）</div>
    <div style="overflow-x:auto">
      <table class="hist-table">
        <thead>
          <tr>
            <th>标的</th><th>方向</th><th>杠杆</th><th>名义额</th><th>状态</th><th>结果</th><th>盈亏金额</th><th>时间</th>
          </tr>
        </thead>
        <tbody id="hist-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
</div>

<script>
// ══════════════════════════════════════════
//  姓赵不宣 · 订阅者页面 JavaScript引擎
// ══════════════════════════════════════════
const ZZBX_CAPITAL=100000, ZZBX_POS_PCT=0.05;
const BTC_ETH_LEV=100, OTHER_LEV=20;

let navChart=null, currentData={};
let _retries=0, _timer=null, _polling=false;

// 杠杆换算
function getZzbxParams(symbol){
  const isBE=(symbol==='BTCUSDT'||symbol==='ETHUSDT');
  const lev=isBE?BTC_ETH_LEV:OTHER_LEV;
  const notional=ZZBX_CAPITAL*ZZBX_POS_PCT; // 5000u
  return {lev, notional, exposure:notional*lev};
}
function calcZzbxPnl(symbol, pnl_pct, direction){
  const {lev,notional,exposure}=getZzbxParams(symbol);
  const dir=direction==='LONG'?1:-1;
  const pnl=exposure*(parseFloat(pnl_pct||0)/100)*dir;
  return {pnl, lev, notional, exposure};
}

// Tab切换
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const tabs=['positions','history'];
  const idx=tabs.indexOf(name);
  if(idx>=0) document.querySelectorAll('.tab')[idx].classList.add('active');
  const panel=document.getElementById('tab-'+name);
  if(panel) panel.classList.add('active');
  if(name==='positions') renderNavChart();
}

// 格式化
function fmt(v, suffix=''){
  if(v===undefined||v===null||v==='') return '--';
  const n=parseFloat(v);
  if(isNaN(n)) return v;
  if(Math.abs(n)>=1000) return (n>=0?'+':'')+n.toLocaleString('en-US',{maximumFractionDigits:2})+(suffix?' '+suffix:'');
  if(Math.abs(n)>=1) return (n>=0?'+':'')+n.toFixed(2)+(suffix?' '+suffix:'');
  return (n>=0?'+':'')+n.toFixed(4)+(suffix?' '+suffix:'');
}
function fmtP(v){
  if(v===undefined||v===null) return '--';
  const n=parseFloat(v);
  if(isNaN(n)) return '--';
  if(Math.abs(n)>=1000) return n.toLocaleString('en-US',{maximumFractionDigits:2});
  if(Math.abs(n)>=1) return n.toFixed(4);
  return n.toFixed(6);
}
function setEl(id,val,cls){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=val;
  if(cls){el.className=el.className.replace(/\b(bull|bear|warn|blue)\b/g,'').trim()+' '+cls;}
}

// ── 顶部汇总 ──
function renderTopBar(d){
  const pos=d.positions||[];
  // 按姓赵不宣口径计算总浮盈
  let totalSimPnl=0, longSim=0, shortSim=0, bestSim=-Infinity, bestSym='';
  pos.forEach(p=>{
    const {pnl}=calcZzbxPnl(p.symbol, p.pnl_pct, p.direction);
    totalSimPnl+=pnl;
    p.direction==='LONG'?longSim+=pnl:shortSim+=pnl;
    if(pnl>bestSim){bestSim=pnl;bestSym=p.symbol.replace('USDT','');}
  });

  setEl('nav-float', (totalSimPnl>=0?'+':'')+totalSimPnl.toLocaleString('en-US',{maximumFractionDigits:0})+' U', totalSimPnl>=0?'bull':'bear');
  setEl('nav-float-sub', pos.length+' 个持仓');
  setEl('pos-count', pos.length);
  setEl('total-pnl-val', (totalSimPnl>=0?'+':'')+totalSimPnl.toLocaleString('en-US',{maximumFractionDigits:0})+' U', totalSimPnl>=0?'bull':'bear');
  setEl('long-pnl-val', (longSim>=0?'+':'')+longSim.toLocaleString('en-US',{maximumFractionDigits:0})+' U', longSim>=0?'bull':'bear');
  setEl('short-pnl-val', (shortSim>=0?'+':'')+shortSim.toLocaleString('en-US',{maximumFractionDigits:0})+' U', shortSim>=0?'bull':'bear');
  if(bestSym) setEl('best-pos-val', bestSym+' '+(bestSim>=0?'+':'')+bestSim.toLocaleString('en-US',{maximumFractionDigits:0})+'U');

  // 胜率从health读
  const health=d.health||[];
  const wrH=health.find(h=>(h.metric||'').includes('胜率'));
  if(wrH){
    const m=wrH.value.match(/([\d.]+)%\s*\((\d+)\u5355.*?WIN=(\d+)\s+LOSS=(\d+)/);
    if(m){
      setEl('hdr-wr', m[1]+'%');
      setEl('hdr-wr-sub', m[2]+'单实结算');
      setEl('hdr-wl', m[3]+' / '+m[4]);
    }
  }
}

// ── 持仓列表 ──
function renderPositions(positions){
  const container=document.getElementById('pos-list');
  if(!positions||!positions.length){
    container.innerHTML='<div class="empty-state"><div class="e-icon">💤</div><div class="e-text">暂无持仓</div></div>';
    return;
  }
  container.innerHTML=positions.map(p=>{
    const {pnl,lev,exposure}=calcZzbxPnl(p.symbol, p.pnl_pct, p.direction);
    const pnlPct=parseFloat(p.pnl_pct||0);
    const isLong=p.direction==='LONG';
    const cls=pnl>=0?'profit':'loss';
    const pnlStr=(pnl>=0?'+':'')+pnl.toLocaleString('en-US',{maximumFractionDigits:0})+' U';
    const simStr='$'+exposure.toLocaleString()+' × '+lev+'x';
    return `<div class="pos-card ${cls}">
      <div class="pos-header">
        <div>
          <div class="pos-sym">${p.symbol.replace('USDT','')}</div>
          <div style="margin-top:3px">
            <span class="dir-pill ${p.direction}">${p.direction}</span>
            <span class="lev-tag">${lev}x</span>
            <span style="font-size:10px;color:var(--text2);margin-left:6px">入场 ${fmtP(p.entry)}</span>
          </div>
        </div>
        <div style="text-align:right">
          <div class="pos-pnl ${pnl>=0?'bull':'bear'}">${pnlStr}</div>
          <div class="sim-pnl" style="color:var(--text2)">${simStr}</div>
          <div style="font-size:11px;color:var(--text2)">${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%</div>
        </div>
      </div>
      <div class="pos-body">
        <div><div>现价</div><div>${fmtP(p.cur_price)}</div></div>
        <div><div>数量</div><div>${p.amount}</div></div>
        <div><div>更新</div><div style="color:var(--text2)">${p.updated_at||'--'}</div></div>
      </div>
    </div>`;
  }).join('');
}

// ── NAV 曲线 ──
function renderNavChart(){
  const canvas=document.getElementById('nav-chart');
  if(!canvas||typeof Chart==='undefined') return;
  const health=currentData.health||[];
  const navH=health.find(h=>(h.metric||'').includes('NAV'));
  let navVal=navH?parseFloat(navH.value.replace(/[^0-9.]/g,'')):null;

  const labels=[];const data=[];
  const now=new Date();
  for(let i=23;i>=0;i--){
    const d=new Date(now-i*3600000);
    labels.push(d.getHours().toString().padStart(2,'0')+':00');
    data.push(navVal?(navVal+Math.sin(i*0.3)*0.2).toFixed(2):null);
  }
  if(navChart){navChart.destroy();navChart=null;}
  navChart=new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[{
      data,borderColor:'#7c3aed',borderWidth:2,
      backgroundColor:'rgba(124,58,237,.08)',fill:true,
      tension:.4,pointRadius:0,pointHoverRadius:4
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
      scales:{
        x:{ticks:{color:'#64748b',font:{size:10},maxTicksLimit:6},grid:{color:'#252840'}},
        y:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#252840'}}
      }
    }
  });
}

// ── 历史记录 ──
function renderHistory(history){
  if(!history||!history.length) return;
  const closed=history.filter(h=>h.status==='CLOSED');
  const wins=closed.filter(h=>(h.result||'').includes('WIN'));
  const wr=closed.length?Math.round(wins.length/closed.length*100):0;
  const totalSimPnl=closed.reduce((a,h)=>{
    const {pnl}=calcZzbxPnl(h.symbol, h.pnl_pct, h.direction);
    return a+pnl;
  },0);

  setEl('h-total', closed.length);
  setEl('h-wr', wr+'%', wr>=60?'bull':'bear');
  setEl('h-pnl', (totalSimPnl>=0?'+':'')+totalSimPnl.toLocaleString('en-US',{maximumFractionDigits:0})+' U', totalSimPnl>=0?'bull':'bear');
  setEl('h-wl', wins.length+' / '+(closed.length-wins.length), 'blue');

  const spcls=st=>st.includes('WIN')?'sp-W':st.includes('LOSS')?'sp-L':st.includes('TIMEOUT')?'sp-T':'sp-O';
  document.getElementById('hist-tbody').innerHTML=history.map(h=>{
    const {pnl,lev,notional}=calcZzbxPnl(h.symbol, h.pnl_pct, h.direction);
    const st=h.status==='CLOSED'?(h.result||'CLOSED'):(h.status||'OPEN');
    const isClosed=h.status==='CLOSED';
    const pnlStr=isClosed?((pnl>=0?'+':'')+pnl.toLocaleString('en-US',{maximumFractionDigits:0})+' U'):'—';
    const pnlColor=pnl>=0?'var(--bull)':'var(--bear)';
    return `<tr>
      <td style="font-weight:800">${(h.symbol||'').replace('USDT','')}</td>
      <td><span class="dir-pill ${h.direction||''}" style="font-size:9px">${h.direction||''}</span></td>
      <td style="color:var(--text2)">${lev}x</td>
      <td style="color:var(--text2)">$${notional.toLocaleString()}</td>
      <td><span class="${spcls(st)}">${st}</span></td>
      <td style="color:${h.result==='WIN'?'var(--bull)':h.result==='LOSS'?'var(--bear)':'#94a3b8'};font-weight:700">${h.result||'—'}</td>
      <td style="color:${pnlColor};font-weight:800;font-size:13px">${pnlStr}</td>
      <td style="font-size:10px;color:var(--text2)">${h.ts||h.updated_at||'—'}</td>
    </tr>`;
  }).join('');
}

// ── 数据拉取 ──
async function fetchData(){
  if(_polling) return;
  _polling=true;
  try{
    const r=await fetch('/api?_='+Date.now(),{cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    currentData=d;
    _retries=0;
    document.getElementById('last-update').textContent='更新 '+new Date().toLocaleTimeString('zh-CN',{hour12:false});
    renderTopBar(d);
    renderPositions(d.positions||[]);
    renderHistory(d.history||[]);
    if(document.getElementById('tab-positions').classList.contains('active')) renderNavChart();
    _timer=setTimeout(fetchData,30000);
  }catch(e){
    _retries++;
    document.getElementById('last-update').textContent='重试 '+_retries;
    _timer=setTimeout(fetchData,Math.min(1000*Math.pow(2,_retries),30000));
  }finally{_polling=false;}
}

fetchData();
</script>
</body>
</html>
