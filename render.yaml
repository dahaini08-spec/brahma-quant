services:
  - type: web
    name: brahma-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/brahma_dashboard_server.py --port $PORT
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /api
    autoDeploy: true
