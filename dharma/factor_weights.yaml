# ═══════════════════════════════════════════════════════════════════════
# 达摩院因子权重数据库  v1.0  2026-06-03
# ═══════════════════════════════════════════════════════════════════════
#
# 设计原则：
#   每个因子权重 = 实盘铁证驱动，不是经验估计
#   数据来源：dharma_structures/ 共278,872条  OB基准WR=70.7%
#   评分公式：每1% WR差 ≈ 1.5分（基于期望值线性关系）
#
# 文件结构：
#   factor_id: 因子唯一ID
#   score:     brahma_brain加分值（负数=惩罚）
#   basis:     铁证来源（WR + 样本量）
#   status:    live=已落地  pending=待落地  blocked=暂缓
#   category:  引擎分类
#
# 修改规则：
#   1. 只有达摩院实训数据支持才能修改score
#   2. n < 1000 的因子不得给高分（>5分）
#   3. 每次修改须在 basis 中更新铁证日期
#   4. 修改后必须运行 smoke_test.py 4/4 PASS
# ═══════════════════════════════════════════════════════════════════════

meta:
  version: "1.0"
  created: "2026-06-03"
  base_wr: 70.7       # OB单独 WR=70.7% n=140,443  ← 所有因子的基准线
  base_n: 140443
  data_cutoff: "2024-12-31"   # 训练数据截止线，禁止修改
  atr_q1_thresh: 0.243   # 精确值: BTCUSDT 15m Q1=0.243%  2026-06-03更新
  atr_q4_thresh: 0.531   # 精确值: BTCUSDT 15m Q3=0.531%  2026-06-03更新

# ───────────────────────────────────────────────────────────────────────
# Gate层：必要条件（任何一个失败 → score直接清零）
# ───────────────────────────────────────────────────────────────────────
gates:
  - id: GATE_OB_EXISTS
    name: "OB存在门"
    condition: "has_valid_ob == True"
    action: REJECT
    basis: "OB是所有WR提升的基础，无OB=无alpha  n=140,443"
    status: pending   # 待落地到analyze()入口
    priority: P0

  - id: GATE_ATR_Q4
    name: "极端高波动门"
    condition: "atr_pct > 0.55%"   # Q4分位数
    action: SCORE_PENALTY
    score: -10
    basis: "ATR Q4 WR=64.3% vs Q1=75.9%  差-11.6%  n=35,030  2026-06-03"
    status: pending
    priority: P0

  - id: GATE_SESSION_DEAD
    name: "死亡时段"
    condition: "utc_hour in [0, 22, 23]"
    action: SCORE_PENALTY
    score: -5
    basis: "深夜时段PF<0.95  n>10K  2026-05-27"
    status: live   # Phase2c已落地

