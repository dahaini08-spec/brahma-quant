# ───────────────────────────────────────────────────────────────────────
# 研究待确认（数据不足，暂不落地）
# ───────────────────────────────────────────────────────────────────────
pending_research:
  - id: OB_DENSITY
    name: "OB密度（24H内OB数量）"
    hypothesis: "OB稀疏时WR更高（稀疏=83.3% vs 密集=70.7%）"
    status: research_insufficient_sample   # n=6/10/15 样本极少，不可信
    note: "需要重新设计：按OB形成后的K线间隔（非密度）"

  - id: FVG_DIRECTION
    name: "FVG方向区分"
    hypothesis: "BEARISH_FVG做空=同向  BULLISH_FVG做空=反向"
    actual_result: "BEARISH WR=69.6% vs BULLISH WR=71.3%，差-1.7%，无增量"
    status: closed   # 数据不支持，关闭此研究

  - id: OB_RECENCY
    name: "OB新鲜度（生成后X根K线）"
    hypothesis: "新鲜OB WR > 老化OB"
    status: research_needed

  - id: OB_VOLUME_AT_FORMATION
    name: "OB形成时的成交量"
    hypothesis: "高量形成的OB更可靠"
    status: research_needed

  - id: MULTI_TF_OB_ALIGNMENT
    name: "多周期OB对齐（15m+1H+4H）"
    hypothesis: "三周期OB重叠区WR>80%"
    status: research_needed

  - id: FVG_QUALITY
    name: "FVG质量评分"
    hypothesis: "FVG大小×位置×新鲜度→WR"
    basis: "当前有FVG vs 无FVG WR无差异（-0.1%）需细化"
    status: research_needed

