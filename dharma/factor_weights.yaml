    name: "极强量能>2.0x"
    condition: "vol_ratio > 2.0"
    score: +7
    basis: "WR=75.3%  n=7,744  差+4.6%  2026-06-03"
    status: pending
    priority: P1

  - id: VOL_HIGH
    name: "高量能1.5-2.0x"
    condition: "1.5 <= vol_ratio < 2.0"
    score: +5
    basis: "WR=74.2%  n=7,864  差+3.5%  2026-06-03"
    status: live   # Phase2a已落地

  - id: VOL_MEDIUM
    name: "中量能1.2-1.5x"
    condition: "1.2 <= vol_ratio < 1.5"
    score: +4
    basis: "WR=73.2%  n=10,532  差+2.5%  2026-06-03"
    status: live

  - id: VOL_LOW
    name: "缩量<0.8x"
    condition: "vol_ratio < 0.8"
    score: -3
    basis: "WR=68.8%  n=81,777  差-1.9%  2026-06-03"
    status: pending
    priority: P1

