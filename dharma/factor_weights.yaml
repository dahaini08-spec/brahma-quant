# factor_weights.yaml — 梵天因子权重配置
# Brahma-Quant Open Source v3.0 | 设计院封印 2026-07-02
#
# ⚠️  PRO 版说明
# ════════════════════════════════════════════════
# 本文件为权重模板（Open Core 版本）。
# 所有权重值均为占位符 (0.0)。
#
# Pro 版训练好的因子权重通过以下方式获取：
#   - 完成 Dharma 回测验证流程
#   - 使用 brahma_brain/dharma_online_learner.py 在线学习
#   - 参见 CONTRIBUTING.md 中的 Pro 版获取方式
# ════════════════════════════════════════════════

version: "3.0-oss"
pro_note: "Pro版权重通过在线学习器训练，不在开源版中提供"

# ── 技术指标层权重 ─────────────────────────────────────────────
technical:
  rsi_1h:    0.0   # Pro: 实盘统计后的RSI权重
  rsi_4h:    0.0
  rsi_1d:    0.0
  bb_width:  0.0   # Bollinger Band 宽度
  bb_pos:    0.0   # BB 位置
  atr_pct:   0.0   # ATR 百分比
  volume_ratio: 0.0

# ── SMC 结构层权重 ─────────────────────────────────────────────
smc:
  ob_score:    0.0  # Order Block 评分权重
  fvg_score:   0.0  # Fair Value Gap 权重
  bos_score:   0.0  # Break of Structure 权重
  choch_score: 0.0  # Change of Character 权重
  grade:       0.0  # 结构综合评级权重

# ── 体制感知层权重 ─────────────────────────────────────────────
regime:
  BEAR_TREND:
    short_multiplier: 0.0  # Pro: 1.6x
    long_multiplier:  0.0  # Pro: 0.10x
  BULL_TREND:
    short_multiplier: 0.0  # Pro: 0.15x
    long_multiplier:  0.0  # Pro: 1.6x
  CHOP_MID:
    short_multiplier: 0.0  # Pro: 0.88x
    long_multiplier:  0.0  # Pro: 0.50x
  BEAR_EARLY:
    short_multiplier: 0.0  # Pro: 1.2x
    long_multiplier:  0.0  # Pro: 0.35x
  BEAR_RECOVERY:
    short_multiplier: 0.0  # Pro: 0.30x
    long_multiplier:  0.0  # Pro: 1.2x

# ── 外部信号层权重 ─────────────────────────────────────────────
external:
  s_cross:    0.0  # 跨所FR+Basis权重
  s_options:  0.0  # Deribit P/C OI权重
  s_macro_v2: 0.0  # DXY+NQ+BTC.D权重
  oi_change:  0.0  # OI变化率权重
  funding:    0.0  # 资金费率权重

# ── Kronos 时序模型权重 ────────────────────────────────────────
kronos:
  p_up_weight:  0.0  # Kronos上涨概率权重
  shadow_mode:  true # shadow模式，不影响评分（等待n≥100验证）
