name: brahma-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -r requirements-core.txt
          pip install -e .
          pip install pytest ruff

      - name: Compile (syntax check)
        run: |
          python -m compileall \
            brahma_brain \
            brahma_v6 \
            dharma \
            dharma_simfactory \
            guardrails \
            nerve_system \
            tests \
            -q

      - name: Ruff (critical errors only)
        run: |
          ruff check . --select E9,F63,F7,F82 --exclude venv,external

      - name: Pytest
        run: |
          pytest tests/test_import_smoke.py -q
