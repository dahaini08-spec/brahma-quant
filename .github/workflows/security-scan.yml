# .github/workflows/security-scan.yml
# 梵天安全扫描 CI | 设计院 2026-07-08
# 每次 push 自动扫描硬编码密钥 + 运行安全测试

name: Security Scan

on:
  push:
    branches: [ main, oss-sync-20260702 ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    name: Secret & Key Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全历史扫描

      - name: Scan for leaked keys (pattern)
        run: |
          echo "=== 扫描硬编码API密钥 ==="
          # 已知泄露的密钥特征
          if grep -rE "sDqoRAye|hXQnzQco" --include="*.py" .; then
            echo "❌ 发现已知泄露密钥！"
            exit 1
          fi
          echo "✅ 无已知泄露密钥"

      - name: Scan for hardcoded API key patterns
        run: |
          echo "=== 扫描硬编码密钥模式 ==="
          # 检测 KEY = 'xxx'（不含os.environ的）
          FOUND=$(grep -rEn "(API_KEY|API_SECRET|_BN_KEY|_BN_SEC)\s*=\s*'[A-Za-z0-9]{40,}'" \
            --include="*.py" \
            --exclude-dir=.git \
            --exclude-dir=.venv \
            --exclude-dir=tests \
            . || true)
          if [ -n "$FOUND" ]; then
            echo "❌ 发现硬编码密钥:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ 无硬编码密钥模式"

      - name: Install dependencies
        run: |
          pip install pytest -q

      - name: Run security tests
        run: |
          cd $GITHUB_WORKSPACE
          python -m pytest tests/test_security.py -v --tb=short 2>&1 || true
          echo "安全测试完成"

  safety-config-check:
    name: Safety Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate safety.yaml exists
        run: |
          test -f config/safety.yaml && echo "✅ config/safety.yaml 存在" || echo "⚠️ 缺少config/safety.yaml"

      - name: Check pyproject.toml
        run: |
          test -f pyproject.toml && echo "✅ pyproject.toml 存在" || echo "⚠️ 缺少pyproject.toml"
