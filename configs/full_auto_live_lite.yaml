mode: FULL_AUTO_LIVE_LITE
exchange:
  name: BINANCE_USDS_M_FUTURES
  environment: LIVE
  test_order_first: true
  require_exchange_info: true
  require_user_stream: true
symbols:
  allowlist: [ETHUSDT]
  max_symbols: 1
account:
  margin_type: ISOLATED
  leverage: 5
  allow_cross_margin: false
orders:
  allowed_order_types: [LIMIT, LIMIT_MAKER]
  allow_market_order: false
  max_open_orders: 1
  max_order_retry: 1
  require_client_order_id: true
  require_reduce_only_for_degrade: true
  max_slippage_bps: 10
  cancel_replace_timeout_seconds: 20
risk:
  max_open_positions: 1
  max_trades_per_day: 20
  max_daily_loss_pct: 0.10
  max_consecutive_losses: 3
  cooldown_after_loss_minutes: 20
  cooldown_after_reject_minutes: 10
  block_if_min_notional_exceeds_risk_budget: true
position:
  hard_stop_loss_pct: 0.02
  trailing_take_profit_enabled: true
  trailing_activation_pct: 0.012
  trailing_distance_pct: 0.006
  max_holding_minutes: 240
ev_governance:
  require_ev_allow: true
  block_watchlist: true
  block_down_weight: true
  block_negative_expectancy: true
  low_sample_action: WATCHLIST
kill_switch:
  enabled: true
  trigger_on_ledger_failure: true
  trigger_on_duplicate_order_id: true
  trigger_on_reconciliation_failure: true
  trigger_on_live_synthetic_fill: true
  trigger_on_daily_loss_breach: true
  unknown_order_timeout_seconds: 30
ops:
  dlq_enabled: true
  healthcheck_interval_seconds: 10
  reconciliation_interval_seconds: 15
  report_interval_minutes: 30
